<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot Configuration - IMCBOTS</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca&display=swap" rel="stylesheet">
    <style>
        /* ... Keep your existing body, .title-container, .config-box, etc. styles ... */
        
        #successView {
            display: none; 
            background: rgba(0, 0, 0, 0.8); 
            padding: 30px; 
            border-radius: 20px; 
            border: 1px solid #00FF00; 
            max-width: 400px; 
            margin: 40px auto; 
            backdrop-filter: blur(5px); 
            position: relative;
            height: 300px; 
            overflow: hidden;
        }

        .slide-img {
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%);
            width: 90%; 
            height: auto; 
            border-radius: 10px; 
            opacity: 0;
            transition: opacity 1.5s ease-in-out; /* Smooth fade effect */
        }

        .slide-img.active { opacity: 1; }
        
        /* ... Keep your other existing styles ... */
    </style>
</head>
<body>

    <!-- ... Keep your setupContent section as is ... -->

    <div id="successView">
        <img src="images/saver1.jpg" class="slide-img active" id="img1">
        <img src="images/saver2.png" class="slide-img" id="img2">
        <img src="images/saver3.jpg" class="slide-img" id="img3">
        <img src="images/saver4.jpg" class="slide-img" id="img4">
    </div>

    <script>
        // ... Keep your existing botDatabase and initial logic ...

        function startSlideshow() {
            let current = 1;
            const totalImages = 4;
            
            setInterval(() => {
                // Hide current
                document.getElementById('img' + current).classList.remove('active');
                
                // Calculate next
                current = (current % totalImages) + 1;
                
                // Show next
                document.getElementById('img' + current).classList.add('active');
            }, 12000); // 12 seconds
        }

                document.getElementById('successView').style.display = 'block';
                startSlideshow();
            } else {
                alert("Incorrect password.");
            }
        }
    </script>
</body>
</html>
