<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMCBOTS Showcase</title>
    <style>
        body { 
            background: #011c12; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            font-family: sans-serif; 
        }
        #botTitle { text-transform: uppercase; }
        #galleryContainer { 
            background: #022b1b; 
            padding: 20px; 
            border-radius: 20px; 
            border: 1px solid #058743; 
            width: 90%; 
            max-width: 500px; 
            height: 400px; 
            position: relative; 
            overflow: hidden; 
        }
        .media-item { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%) scale(1); 
            width: 100%; 
            height: 100%; 
            object-fit: contain; 
            opacity: 0; 
            transition: opacity 1s ease-in-out, transform 6s linear; 
            z-index: 1; 
        }
        .media-item.active { 
            opacity: 1; 
            transform: translate(-50%, -50%) scale(1.15); 
            z-index: 2; 
        }
        .bank-details { color: white; font-size: 1.2rem; line-height: 2.5; }
        .bnk { text-decoration: underline; font-weight: bold; }
        
    </style>
</head>
<body>

    <h1 id="botTitle">Loading...</h1>
    <div id="galleryContainer"></div>

    <script>

        const commonImages = [ 'images/btspstr.png', 'bprz.png', 'rangprz.png', 'shdwprz.png', 'Sltprzz.png', 'slssonicprz.png', 'twistrprz.png', 'flr.png', 'froprz.png', 'fdprz.png', 'images/btscrtr.png', 'btscl.jpg', 'imcbots1.mp4', 'imcbotscvr.mp4' ];

        const botData = {
            'db - fe': { video:['dbv.mp4' ], images: ['images/db3.PNG', 'trades/db4.PNG', 'trades/db5.PNG', 'trades/db6.png', 'trades/db7.png', 'dbcl.jpg', ...commonImages], color: '#FFA800' },
            'flow': { video:['flowcc.mp4' ], images: [ 'fl0.PNG', 'flow2.PNG', 'flow4.PNG', 'flow5.png', 'flow11.PNG', 'flow12.png', 'flow13.png', 'flcl.jpg', 'flwsd.jpg', ...commonImages], color: '#088F8F' },
            'dba': { video:[ 'dbav.mp4'], images: ['trades/dba1.PNG', 'trades/dba3.PNG', 'trades/dba4.png', 'trades/dba5.PNG', 'trades/dba6.PNG', 'trades/dba7.png', 'trades/dba8.PNG', 'trades/dba9.jpg', 'trades/dba10.PNG', 'trades/dba11.jpg', 'trades/dba12.png', 'dba11.jpg', 'dbacl.jpg', ...commonImages], color: '#00d062' }, 
            'sa': { video:['sav.mp4' ], images: ['sa55.PNG', 'sa56.PNG', 'sa57.png', 'sa58.png', 'sa93.PNG', 'saccl.jpg', ...commonImages],  color: '#39FF14' }, 
            'master': { video:['mstrv.mp4' ], images: ['trades/master1.PNG', 'trades/master5.PNG', 'trades/master8.png', 'trades/master9.png', 'trades/master10.png', 'trades/master2.png', 'trades/master4.jpg', 'trades/master5.jpg', 'trades/master6.jpg', 'trades/master15.png', 'mastercl.jpg', ...commonImages], color: '#00FFFF' }, 
            'prgtry': { video:['pgtryv.mp4' ], images: ['trades/prgtry2.PNG', 'trades/prgtry3.PNG', 'trades/prgtry4.PNG', 'trades/prgtry5.PNG', 'trades/prgtry6.png', 'trades/prgtry7.png', 'trades/prgtry8.png', 'trades/prgtry9.png', 'trades/prgtry10.png', 'pgtryccll.jpg',  ...commonImages],  color: '#BBC2CC' }, 
            'king': { video:['kngv.mp4' ], images: ['trades/king2.PNG', 'trades/king8.PNG', 'trades/king9.png', 'trades/king4.jpg', 'trades/king5.PNG', 'kngcl.jpg', ...commonImages],  color: '#FF2400' }, 
            'asura': { video:['asrv.mp4' ], images: ['trades/asura1.PNG', 'trades/asura6.jpg', 'trades/asura4.png', 'trades/asura5.png', 'asuracll.jpg', ...commonImages], color: '#800080' },
            'twister': { video:['twstcvr.mp4' ], images: ['twstr1.PNG', 'twstr3.PNG', 'twstr4.png', 'twstr5.PNG', 'twstr6.PNG', 'twstr7.png', 'twstcl.jpg',...commonImages], color: '#B2BEB5' },
            'rang': { video:['rangcvr.mp4' ], images: ['rng1.PNG', 'rng2.PNG', 'rng4.png', 'rngcl.png',...commonImages], color: '#6E260E' },
            'shadow': { video:['shadow.mp4' ], images: ['shdw2.PNG', 'shdwcl.jpg',...commonImages], color: '#FFAE42' },
            'light': { video:['sltcvr.mp4' ], images: [ 'sltcl.jpg',...commonImages], color: '#FFFFF0' },
            'sprsonic': { video:['slsscvr.mp4' ], images: [ 'snc1.PNG', 'sspcl.jpg',...commonImages], color: '#FFFFF0' },
            'deep': { video:['dpcvr.mp4' ], images: [ 'dp1.PNG', 'dpcl.jpg',...commonImages], color: '#04003f' },
            'frost': { video:['frocvr.mp4' ], images: [ 'fr1.PNG', 'frocl.jpg',...commonImages], color: '#a2d2df' },
            'plasma': { video:['plcvr.mp4' ], images: [ 'bp1.PNG', 'plcl.jpg',...commonImages], color: '#8a6665' }
        };

        const params = new URLSearchParams(window.location.search);
        const botKey = params.get('bot');
        const container = document.getElementById('galleryContainer');
        const title = document.getElementById('botTitle');

        if (botKey === 'bank') {
            title.innerText = "Bank Details";
            title.style.color = "#FFFFFF";
            container.style.borderColor = "#FFFFFF";
            container.innerHTML = `
                <div class="bank-details">
                    <ul style="list-style: none; padding: 0;">
                        <li><div class='bnk'>Bank:</div> Capitec</li>
                        <li><div class='bnk'>Acc. no:</div> 1195468286</li>
                        <li><div class='bnk'>Acc. type:</div> Savings</li>
                    </ul>
                </div>`;
                
        } else if (botKey === 'comic') { 
            title.innerHTML = `<u>IMCBOTS-COMICS</u><br><span style="display: block; text-align: center; font-size: 60%; text-transform: lowercase;">(read)</span>`;
            title.style.color = "#7393B3";
            container.style.borderColor = "#7393B3";
            container.style.padding = "0"; // Maximize viewing area
            
            // Inject styling for comic controls
            const style = document.createElement('style');
            style.innerHTML = `
                .sword-arrow {
                    position: absolute;
                    top: 50%;
                    transform: translateY(-50%);
                    background: rgba(1, 28, 18, 0.85);
                    border: 1px solid #7393B3;
                    border-radius: 5px;
                    cursor: pointer;
                    z-index: 10;
                    padding: 8px 12px;
                    box-shadow: 0 0 8px rgba(115, 147, 179, 0.4);
                    transition: all 0.3s ease;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    outline: none;
                }
                .sword-arrow:hover {
                    box-shadow: 0 0 15px rgba(115, 147, 179, 0.9);
                    background: rgba(115, 147, 179, 0.15);
                    transform: translateY(-50%) scale(1.1);
                }
                .arrow-right:hover {
                    /* Preserve the flip for the right arrow on hover */
                    transform: translateY(-50%) scaleX(-1) scale(1.1);
                }
                .arrow-left { left: 10px; }
                .arrow-right { right: 10px; transform: translateY(-50%) scaleX(-1); }
                
                .zoom-panel {
                    position: absolute;
                    bottom: 15px;
                    left: 50%;
                    transform: translateX(-50%);
                    background: rgba(1, 28, 18, 0.9);
                    border: 1px solid #7393B3;
                    border-radius: 20px;
                    display: flex;
                    align-items: center;
                    gap: 15px;
                    padding: 5px 20px;
                    z-index: 10;
                    box-shadow: 0 0 8px rgba(115, 147, 179, 0.4);
                }
                .zoom-btn {
                    background: none;
                    border: none;
                    color: #7393B3;
                    font-size: 24px;
                    cursor: pointer;
                    font-weight: bold;
                    transition: color 0.2s;
                    padding: 0 5px;
                }
                .zoom-btn:hover { color: #fff; }
                #zoomLevelText { color: #7393B3; font-weight: bold; min-width: 45px; text-align: center; font-size: 14px;}
                
                #comicWrapper {
                    width: 100%;
                    height: 100%;
                    overflow: auto;
                    position: relative;
                    display: flex;
                    align-items: center; 
                    justify-content: center;
                    border-radius: 18px;
                }
                
                /* Custom Scrollbars for smooth aesthetics */
                #comicWrapper::-webkit-scrollbar { width: 8px; height: 8px; }
                #comicWrapper::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); border-radius: 10px; }
                #comicWrapper::-webkit-scrollbar-thumb { background: #7393B3; border-radius: 10px; }
                
                #comicImg {
                    transition: width 0.3s ease;
                    object-fit: contain;
                    display: block;
                    max-width: 100%;
                    max-height: 100%;
                }
            `;
            document.head.appendChild(style);

            // Stylish SVG sword
            const swordSvg = `
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 30" width="40" height="16">
                    <!-- Pommel -->
                    <circle cx="92" cy="15" r="5" fill="#ffd700"/>
                    <!-- Grip -->
                    <rect x="72" y="12" width="20" height="6" fill="#555"/>
                    <!-- Crossguard -->
                    <rect x="67" y="2" width="5" height="26" rx="2" fill="#ffd700"/>
                    <!-- Blade -->
                    <path d="M67 12 L0 15 L67 18 Z" fill="#e0e0e0"/>
                    <line x1="15" y1="15" x2="67" y2="15" stroke="#999" stroke-width="1"/>
                </svg>
            `;

            container.innerHTML = `
                <div id="comicWrapper">
                    <img id="comicImg" src="imccomics.png" alt="IMC Comics">
                </div>
                
                <button id="btnPrev" class="sword-arrow arrow-left" title="Previous Image">
                    ${swordSvg}
                </button>
                <button id="btnNext" class="sword-arrow arrow-right" title="Next Image">
                    ${swordSvg}
                </button>

                <div class="zoom-panel">
                    <button class="zoom-btn" id="btnZoomOut">-</button>
                    <span id="zoomLevelText">100%</span>
                    <button class="zoom-btn" id="btnZoomIn">+</button>
                </div>
            `;

            // Setup state logic
            const images = ['imccomics.png', 'issue0.png', 'imcbotsuniverse.png', 'imcbotscrft.png', 'issue1.png', 'comic2.png', 'plcl.jpg', 'cvr2.png', 'issue2.png', 'rngcl.png', 'issue3.png', 'comic4.png', 'dbacl.jpg', 'cover4.png', 'issue4.png', 'issue42.png', 'pgtryccll.jpg', 'cover5.png', 'issue5.png', 'issue52.png', 'kngcl.jpg', 'cover6.png', 'issue6.png', 'mastercl.jpg', 'cover7.png', 'issue7.png', 'issue72.png', 'saccl.jpg', 'cover8.png', 'issue8.png', 'issue802.png', 'twstcl.jpg'];
            let currentIndex = 0;
            let currentZoom = 100;

            const imgEl = document.getElementById('comicImg');
            const wrapper = document.getElementById('comicWrapper');
            const txtZoom = document.getElementById('zoomLevelText');

            function updateImage() {
                imgEl.src = images[currentIndex];
                currentZoom = 100;
                applyZoom();
            }

            function applyZoom() {
                imgEl.style.width = currentZoom + '%';
                txtZoom.innerText = currentZoom + '%';
                
                if (currentZoom > 100) {
                    
                    wrapper.style.alignItems = 'flex-start';
                    wrapper.style.justifyContent = 'flex-start';
                    imgEl.style.maxHeight = 'none';
                    imgEl.style.maxWidth = 'none';
                } else {
                    // Standard centered view
                    wrapper.style.alignItems = 'center';
                    wrapper.style.justifyContent = 'center';
                    imgEl.style.maxHeight = '100%';
                    imgEl.style.maxWidth = '100%';
                }
            }

            // Bind Navigation Handlers
            document.getElementById('btnPrev').addEventListener('click', () => {
                currentIndex = (currentIndex - 1 + images.length) % images.length;
                updateImage();
            });

            document.getElementById('btnNext').addEventListener('click', () => {
                currentIndex = (currentIndex + 1) % images.length;
                updateImage();
            });

            // Bind Zoom Handlers
            document.getElementById('btnZoomIn').addEventListener('click', () => {
                if (currentZoom < 400) { // Max 400% zoom limit
                    currentZoom += 50;
                    applyZoom();
                }
            });

            document.getElementById('btnZoomOut').addEventListener('click', () => {
                if (currentZoom > 100) { // Minimum 100% boundary
                    currentZoom -= 50;
                    applyZoom();
                }
            });

        } else if (botKey && botData[botKey]) {
            const data = botData[botKey];
            title.innerHTML = `<u>${botKey} Showcase</u><br><span style="display: block; text-align: center; font-size: 60%;">(watch)</span>`;
            title.style.color = data.color;
            container.style.borderColor = data.color;
            const allMedia = [...(data.video || []), ...data.images];
            allMedia.forEach((src) => {
                let mediaElement;
                if (src.toLowerCase().endsWith('.mp4') || src.toLowerCase().endsWith('.webm')) {
                    mediaElement = document.createElement('video');
                    mediaElement.src = src;
                    mediaElement.muted = true;
                    mediaElement.playsInline = true;
                    
                
                    mediaElement.setAttribute('muted', 'true');
                    mediaElement.setAttribute('playsinline', 'true');
                    mediaElement.setAttribute('preload', 'auto');
                } else {
                    mediaElement = document.createElement('img');
                    mediaElement.src = src;
                }
                mediaElement.className = 'media-item'; 
                container.appendChild(mediaElement);
            });

            // SMART CYCLING LOGIC
            let current = 0;
            const items = document.querySelectorAll('.media-item');
            let slideTimeout;
            
            function startSlide() {
                const currentItem = items[current];
                currentItem.classList.add('active');

                if (currentItem.tagName === 'VIDEO') {
                    
                    try { currentItem.currentTime = 0; } catch (e) {}
                    
                    
                    let playPromise = currentItem.play();
                    if (playPromise !== undefined) {
                        playPromise.then(() => {
                            currentItem.addEventListener('ended', changeSlide, { once: true });
                        }).catch(e => {
                            console.log("Playback interrupted:", e);
                            slideTimeout = setTimeout(changeSlide, 4000); 
                        });
                    } else {
                        currentItem.addEventListener('ended', changeSlide, { once: true });
                    }

                } else {
                    // It's an image, stay on it for 5 seconds
                    slideTimeout = setTimeout(changeSlide, 5000);
                }
            }
            
            function changeSlide() {
                const currentItem = items[current];
                currentItem.classList.remove('active');

                if (currentItem.tagName === 'VIDEO') {
                    currentItem.pause(); // Stop it safely
                }
                // Move to next item index
                current = (current + 1) % items.length;
                // Fire up the next asset
                startSlide();
            }
            
            // Start the very first slide execution
            if (items.length > 0) {
                startSlide();
            }

        } else {
            title.innerText = "Bot not found";
        }
    </script>
</body>
</html>
