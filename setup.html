<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot Configuration - IMCBOTS</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca&display=swap" rel="stylesheet">
    <style>
        body { 
            background-image: url('images/bg.png');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            background-repeat: no-repeat;
            color: white; 
            font-family: 'Lexend Deca', sans-serif; 
            padding: 40px; 
            text-align: center; 
            min-height: 100vh;
            margin: 0;
            box-sizing: border-box;
        }

        .title-container {
            background: rgba(0, 0, 0, 0.8); 
            padding: 20px; 
            border-radius: 20px; 
            border: 1px solid #00FF00; 
            max-width: 400px; 
            margin: 0 auto 20px auto; 
            backdrop-filter: blur(5px);
        }

        #botTitle { text-transform: uppercase; margin: 0; text-shadow: 2px 2px 4px rgba(0,0,0,0.7); }

        .color-sa { color: #3FFF00; }      
        .color-master { color: #00FFFF; }  
        .color-king { color: #FF2400; }    
        .color-asura { color: #FF00FF; }   

        /* Shared Container Style */
        .config-box, .success-container { 
            background: rgba(0, 0, 0, 0.8); 
            padding: 30px; 
            border-radius: 20px; 
            border: 1px solid #00FF00; 
            max-width: 400px; 
            margin: auto; 
            backdrop-filter: blur(5px);
        }

        .success-container { display: none; }

        input, select { 
            width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; 
            border: 1px solid #333; background: #222; color: white; box-sizing: border-box; 
        }

        button { 
            background: #00FF00; color: black; border: none; padding: 15px 30px; 
            border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; 
            margin-top: 10px; transition: 0.3s; 
        }

        button:hover { background: #00cc00; transform: scale(1.02); }

        /* Slideshow Animation Logic */
        .slideshow-wrapper {
            position: relative;
            width: 100%;
            height: 250px; /* Adjust based on your image aspect ratio */
            margin-bottom: 20px;
            overflow: hidden;
            border-radius: 10px;
        }

        .slideshow-wrapper img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 1.5s ease-in-out; /* The "slowly fading away" effect */
        }

        .img-hidden { opacity: 0; }
        .img-visible { opacity: 1; }

        .download-btn-final {
            display: inline-block;
            background: #00FF00;
            color: black;
            text-decoration: none;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            width: 100%;
            box-sizing: border-box;
        }

        .notice { font-size: 0.8em; color: #ccc; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div class="title-container">
        <h2 id="botTitle">Configure Your Bot</h2>
    </div>

    <!-- FORM SECTION -->
    <div id="setupForm">
        <p class="notice">Note: These bots are compatible with <strong>MetaTrader 5 (MT5)</strong> only.</p>
        <div class="config-box">
            <input type="text" placeholder="MT5 Account Number" id="accNum">
            <input type="text" placeholder="Trading Server" id="server">
            
            <select id="market">
                <option value="">Select Market</option>
                <optgroup label="Forex Pairs"><option value="eurusd">EURUSD</option><option value="usdjpy">USDJPY</option></optgroup>
                <optgroup label="Indices"><option value="us30">US30 Index</option><option value="nas100">NAS100 Index</option></optgroup>
                <optgroup label="Synthetic Indices"><option value="v75">Volatility 75 Index</option></optgroup>
            </select>

            <input type="password" placeholder="Enter Bot License Password" id="pass">
            <button id="verifyBtn" onclick="verifyBot()">Verify & Download</button>
        </div>
    </div>

    <!-- SUCCESS SECTION (Hidden by default) -->
    <div id="successDisplay" class="success-container">
        <h2 style="color: #00FF00;">Verification Successful!</h2>
        
        <div class="slideshow-wrapper">
            <img src="images/saver1.jpg" id="slide1" class="img-visible" alt="Saver 1">
            <img src="images/saver2.jpg" id="slide2" class="img-hidden" alt="Saver 2">
        </div>

        <p>Your configuration is ready.</p>
        <a id="botLink" href="#" class="download-btn-final" download>Download MT5 File</a>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const botType = params.get('bot');

        const botDatabase = {
            'sa': { title: "Small Account Setup", pass: "IMCBOTSA_9922", file: "files/IMCBOT_SA.mq5", class: "color-sa" },
            'master': { title: "Master Bot Setup", pass: "IMCBOTMaster_101033", file: "files/IMCBOT_Master.mq5", class: "color-master" },
            'king': { title: "King Bot Setup", pass: "IMCBOTKing_10111", file: "files/IMCBOT_KING.mq5", class: "color-king" },
            'asura': { title: "Asura Bot Setup", pass: "IMCBOTAsura_10112", file: "files/IMCBOT_ASURA.mq5", class: "color-asura" }
        };

        const currentBot = botDatabase[botType];
        const titleElement = document.getElementById('botTitle');

        if (currentBot) {
            titleElement.innerText = "IMCBOT " + currentBot.title;
            titleElement.classList.add(currentBot.class);
        }

        function verifyBot() {
            const inputPass = document.getElementById('pass').value;
            const accNum = document.getElementById('accNum').value;
            const server = document.getElementById('server').value;
            const market = document.getElementById('market').value;

            if (!accNum || !server || !market) {
                alert("Please fill in all trading account details.");
                return;
            }

            if (currentBot && inputPass === currentBot.pass) {
                // Hide Form, Show Success Container
                document.getElementById('setupForm').style.display = 'none';
                document.getElementById('successDisplay').style.display = 'block';
                document.getElementById('botLink').href = currentBot.file;
                
                // Start the Slideshow logic
                startSlideshow();
            } else {
                alert("Incorrect password or unauthorized access attempt.");
            }
        }

        function startSlideshow() {
            const s1 = document.getElementById('slide1');
            const s2 = document.getElementById('slide2');
            let showingFirst = true;

            setInterval(() => {
                if (showingFirst) {
                    s1.classList.replace('img-visible', 'img-hidden');
                    s2.classList.replace('img-hidden', 'img-visible');
                } else {
                    s2.classList.replace('img-visible', 'img-hidden');
                    s1.classList.replace('img-hidden', 'img-visible');
                }
                showingFirst = !showingFirst;
            }, 5000); // 5 Seconds
        }
    </script>
</body>
</html>
