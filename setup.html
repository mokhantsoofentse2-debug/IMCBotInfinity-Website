<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMCBOTS Showcase</title>
<style>
        body { background: #000; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; font-family: sans-serif; }
        #botTitle { text-transform: uppercase; }
        #galleryContainer { background: #111; padding: 20px; border-radius: 20px; border: 1px solid #00FF00; width: 90%; max-width: 500px; height: 400px; position: relative; overflow: hidden; }
        
        .media-item { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            /* Start at normal scale */
            transform: translate(-50%, -50%) scale(1); 
            width: 100%; 
            height: 100%; 
            object-fit: contain; 
            opacity: 0; 
            /* Fade over 1s, zoom smoothly over 6s to cover the interval + fade out */
            transition: opacity 1s ease-in-out, transform 6s linear; 
        }
        
        .media-item.active { 
            opacity: 1; 
            /* Zoom in by 15% when active */
            transform: translate(-50%, -50%) scale(1.15); 
        }
        
        /* Bank Details Styling */
        .bank-details { color: white; font-size: 1.2rem; line-height: 2.5; }
        .bnk { text-decoration: underline; font-weight: bold; }
    </style>
</head>
<body>

    <h1 id="botTitle">Loading...</h1>
    <div id="galleryContainer"></div>

    <script>
        // Define media lists (Images only)
        const commonImages = ['images/marketpstr.png', 'mrt.png', 'images/saver1.jpg', 'images/tradesn.PNG', 'images/saver3.jpg', 'images/cmn.jpg', 'images/icon.jpg', 'images/saver5.jpg'];
        
        const botData = {
            'db - fe': { images: ['trades/dbc.jpg',  ...commonImages], color: '#FFA800' }, // Tangerine Orange
            'sa': { images: ['trades/sac.jpg', 'trades/sa4.PNG', 'trades/sa2.PNG',  ...commonImages], color: '#39FF14' }, // Shamrock Green
            'master': { images: ['trades/masterc.jpeg', 'trades/master1.PNG', 'trades/master5.PNG', 'trades/master8.png', 'trades/master9.png', 'trades/master10.png', 'trades/master2.png', 'trades/master4.jpg', 'trades/master5.jpg', 'trades/master6.jpg', 'trades/master15.png', 'trades/masterl.jpg', ...commonImages], color: '#00FFFF' }, // Cyan Blue
            'prgtry': { images: ['trades/purgatoryc.jpg', 'trades/prgtry2.PNG', 'trades/prgtry3.PNG', 'trades/prgtry4.PNG', 'trades/prgtry5.PNG', 'trades/prgtry6.png', 'trades/prgtry7.png', 'trades/prgtry8.png', 'trades/prgtry9.png', 'trades/prgtry10.png', ...commonImages], color: '#BBC2CC' }, // Metalic Silver
            'king': { images: ['trades/kingc.jpg', 'trades/king2.PNG', 'trades/king8.PNG', 'trades/king9.png', 'trades/king4.jpg', 'trades/king5.PNG',...commonImages], color: '#FF2400' }, // Scarlet Red
            'asura': { images: ['trades/asurac.jpg', 'trades/asura1.PNG', 'trades/asura6.jpg', 'trades/asura4.png', 'trades/asura5.png', ...commonImages], color: '#C71585' } // Magenta Purple
            
        };

        const params = new URLSearchParams(window.location.search);
        const botKey = params.get('bot');
        const container = document.getElementById('galleryContainer');
        const title = document.getElementById('botTitle');

        if (botKey === 'bank') {
            title.innerText = "Bank Details";
            title.style.color = "#FFFFFF";
            container.style.borderColor = "#FFFFFF";
            container.innerHTML = `
                <div class="bank-details">
                    <ul style="list-style: none; padding: 0;">
                        <li><div class='bnk'>Bank:</div> Capitec</li>
                        <li><div class='bnk'>Acc. no:</div> 1195468286</li>
                        <li><div class='bnk'>Acc. type:</div> Savings</li>
                    </ul>
                </div>`;
        } else if (botKey && botData[botKey]) {
            const data = botData[botKey];
            title.innerHTML = `<u>${botKey} Showcase</u><br><span style="display: block; text-align: center; font-size: 60%;">(watch)</span>`;
            title.style.color = data.color;
            container.style.borderColor = data.color;
            
            // Generate Image elements
            data.images.forEach((src, index) => {
                const img = document.createElement('img');
                img.src = src;
                img.className = 'media-item' + (index === 0 ? ' active' : '');
                container.appendChild(img);
            });

            // Cycling Logic
            let current = 0;
            const items = document.querySelectorAll('.media-item');
            setInterval(() => {
                items[current].classList.remove('active');
                current = (current + 1) % items.length;
                items[current].classList.add('active');
            }, 5000); 
        } else {
            title.innerText = "Bot not found";
        }
    </script>
</body>
</html>
