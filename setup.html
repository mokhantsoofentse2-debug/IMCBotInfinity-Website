<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMCBOTS Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca&display=swap" rel="stylesheet">
    <style>
        body { 
            background-image: url('images/bg.png');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            color: white; 
            font-family: 'Lexend Deca', sans-serif; 
            text-align: center; 
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #galleryContainer { 
            background: rgba(0, 0, 0, 0.8); 
            padding: 30px; 
            border-radius: 20px; 
            border: 1px solid #00FF00; 
            width: 90%;
            max-width: 400px; 
            height: 400px;
            position: relative;
            overflow: hidden;
        }

        .slide-img {
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%);
            width: 90%; 
            height: auto; 
            border-radius: 10px; 
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }

        .slide-img.active { opacity: 1; }
    </style>
</head>
<body>

    <h1>Bot Showcase</h1>

    <div id="galleryContainer">
        <img src="images/saver1.jpg" class="slide-img active" id="img1">
        <img src="images/saver2.png" class="slide-img" id="img2">
        <img src="images/saver3.jpg" class="slide-img" id="img3">
        <img src="images/saver4.jpg" class="slide-img" id="img4">
    </div>

    <script>
        let current = 1;
        const totalImages = 4; // Updated from 3 to 4

        setInterval(() => {
            // Remove 'active' class from current image
            document.getElementById('img' + current).classList.remove('active');
            
            // Move to the next image
            current++;
            if (current > totalImages) current = 1;
            
            // Add 'active' class to the new image
            document.getElementById('img' + current).classList.add('active');
        }, 12000); // 12 seconds
    </script>
</body>
</html>
