<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final IMCBOT</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@300;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #011a0d; 
            background-image: url('images/bg15.png');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            font-family: 'Lexend Deca', sans-serif;
            color: white;
            margin: 0;
            padding: 20px;
            line-height: 1.6;
            overflow-x: hidden; 
        }

        h1 {
            /* Reflective Metallic Gradient Effect */
            background: linear-gradient(
                135deg, 
                #0F5132 0%, 
                #058743 25%, 
                #ffffff 50%, 
                #058743 75%, 
                #0F5132 100%
            );
            background-attachment: fixed;
            background-size: 100% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            
            /* Underline tracking color */
            text-decoration: underline;
            text-decoration-color: #058743; 
            
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 40px;
        }
        
        li {
            background: rgba(0, 20, 10, 0.75);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #058743;
            text-align: center;
            width: 200px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* Snappy spring effect */
            position: relative;
            z-index: 10;
        }
        
        /* THE AWAKENED AURA HOVER */
        li:hover { 
            transform: translateY(-15px) scale(1.05); 
            box-shadow: 0 0 30px rgba(57, 255, 20, 0.6), inset 0 0 15px rgba(5, 135, 67, 0.5); 
            border-color: #058743;
        }
        li b { display: block; margin-bottom: 15px; font-size: 1.2rem; text-decoration: underline; }

        img { 
            border-radius: 8px; 
            object-fit: cover; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.5); 
            transition: filter 0.4s ease;
        }
        
        /* bot image glow on hover */
        li:hover img {
            filter: drop-shadow(0 0 12px rgba(57,255,20,0.8));
        }

        .back-btn {
            background-color: #0F5132;
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            display: inline-block;
            position: relative;
            z-index: 10;
        }
        .back-btn:hover { 
            background-color: #39FF14; 
            color: #011a0d; 
            box-shadow: 0 0 20px #39FF14; 
            transform: scale(1.05);
        }
        li:hover .flow { color: #058743; text-shadow: 0 0 10px #058743; }
        .flow { transition: all 0.3s ease; }
        
        .sword-line {
            border: none;
            height: 3px;
            /* Added a bright core to the blade */
            background: linear-gradient(to right, transparent, #058743, #39FF14, #058743, transparent);
            box-shadow: 0 0 12px #39FF14;
            margin: 25px auto 15px auto;
            border-radius: 50%;
            width: 90%;
        }
        
        ol {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            list-style: none;
            padding: 0;
            margin-bottom: 40px;
        }
        .back-container { text-align: center; margin: 40px 0; }

        /* DRAGON BREATH EMBERS CSS */
        .ember {
            position: fixed;
            bottom: -10px;
            background: #058743;
            border-radius: 50%;
            pointer-events: none;
            box-shadow: 0 0 8px #058743, 0 0 15px #058743;
            animation: rise linear forwards;
            z-index: 0;
        }
        
        @keyframes rise {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-100vh) scale(0.2); opacity: 0; }
        }
    </style>
</head>
<body>
    <hr class="sword-line">
    <h1>Final IMCBOT</h1>
    <hr class="sword-line">
    
    <ol>
        <li>
            <div class='flow'><b>Flow</b></div>
            <a href="setup.html?bot=flow">
                <img src="flp.png" width="150" height="200" alt="Master Bot">
            </a>
        </li> 
    </ol>
    
    <hr class="sword-line">
    <div class="back-container">
        <a href="index.html" class="back-btn">Back</a>
    </div>
    <hr class="sword-line">

    <script>
        function igniteEmbers() {
            const ember = document.createElement('div');
            ember.classList.add('ember');
            
            // Randomize starting horizontal position across the screen
            ember.style.left = Math.random() * 100 + 'vw';
            
            // Randomize size for depth effect (some look closer, some further)
            const size = Math.random() * 4 + 2; 
            ember.style.width = size + 'px';
            ember.style.height = size + 'px';
            
            // Randomize float speed
            const duration = Math.random() * 4 + 3; // between 3 and 7 seconds
            ember.style.animationDuration = duration + 's';
            
            document.body.appendChild(ember);

            // Clean up the DOM after the animation finishes
            setTimeout(() => {
                ember.remove();
            }, duration * 1000);
        }

        // Spawn a new digital spark every 200 milliseconds
        setInterval(igniteEmbers, 200);
    </script>
</body>
</html>
