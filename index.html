<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <title>IMCBOTS-Infinity</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@300;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-image: url('images/bg.png');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            font-family: 'Lexend Deca', sans-serif;
            color: white;
            margin: 0;
            padding: 20px; /* Reduced for mobile comfort */
            line-height: 1.6;
        }

        h1 {
            color: green; 
            text-transform: uppercase;
            text-decoration: underline;
            text-align: center;
            margin-bottom: 40px;
        }

        ol {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            list-style: none;
            padding: 0;
        }

        li {
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #00FF00;
            text-align: center;
            width: 200px;
            transition: transform 0.3s ease;
        }

        li:hover {
            transform: translateY(-10px);
        }

        li b {
            display: block;
            margin-bottom: 15px;
            font-size: 1.2rem;
            text-decoration: underline;
        }

        img {
            border-radius: 8px;
            object-fit: cover;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }

        footer {
            margin-top: 50px;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 15px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        footer h2 { color: #00FF00; }
        footer a { color: #ffffff; text-decoration: none; }
        footer a:hover { color: #00FF00; }

        .contact-item { margin: 10px 0; font-size: 1.1rem; }

        /* Hover colors */
        li:hover .sa { color: #39FF14; }
        li:hover .master { color: #00FFFF; }
        li:hover .king { color: #FF2400; }
        li:hover .asura { color: #C71585; }

        .sa, .master, .king, .asura { transition: color 0.3s ease; }

        /* --- NEW LOGIC FOR PORTRAIT PHONES --- */
        @media (max-width: 768px) and (orientation: portrait) {
            ol {
                flex-direction: column;
                align-items: center;
            }
            li {
                width: 85%;
                max-width: 280px;
            }
        }
    </style>
</head>

            </a>
        </li>

            <a href="setup.html?bot=king">

        </li>
